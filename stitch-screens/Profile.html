        body { background-color: #F5F5DC; }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="font-body-md text-on-background pb-32">

<div class="flex justify-between items-center w-full px-5 py-3">
<div class="flex items-center gap-3">
<img alt="User avatar" class="w-8 h-8 rounded-full object-cover" data-alt="close-up portrait of a young person with calm expression, warm natural lighting, soft background blur" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMFKXNOa6JkZPWHug2HjqNraI3DkYRLNCnlbMMCHcB6hmZQBnXmAHWY3tTP-7DRoyLMBHDWPlZ50VPxISm-cAhnS-OALPTseD-ir7PY5kJZiv03zlhPuV5q4t5oBD0QtD35L2VIebSV8H15MbAXykKLWPRFgpfLd5kbqRQYN5_D-suMAaJfm_bLmvkxqEXf1C5PTL5mPdFNIswPBBmixoeD6ZAYJGO6Rpumceud7e8mbrHcBo78QOLiPFmWMvR0dnJv4VBGlOvUY8"/>
<span class="font-manrope font-extrabold text-stone-900 dark:text-stone-100 tracking-tighter text-h3 font-h3">StudyTrack AI</span>
</div>
<button class="text-[#C8A97E] dark:text-amber-200 hover:bg-[#FAF3E0] dark:hover:bg-stone-900 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="px-container-padding py-lg max-w-2xl mx-auto flex flex-col gap-card-gap">
<!-- Profile Header Card -->
<section class="bg-[#FAF3E0] rounded-[16px] p-md shadow-[0_4px_15px_0_rgba(30,30,30,0.04)] flex flex-col items-center text-center gap-sm">
<div class="relative mt-sm">
<img alt="User Avatar Large" class="w-24 h-24 rounded-full border-4 border-[#F5F5DC] object-cover shadow-[0_4px_15px_0_rgba(30,30,30,0.04)]" data-alt="close-up portrait of a young person with calm expression, warm natural lighting, soft background blur" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPy34-AIs17PD4ZViJls0LBkIY8Nig0ciW0K0bGYX1zqirXOJJi6fOO7Qnrl3CcARbX5iJtgmbdo6tdXTmRbSgejBwtCTB9RP0-t4zHOYYiMMR9EtCUGrAx-x8RhcAS0ExbEe-VogG1Bvi677KoExIMHHDyLOfWuWmQaqkyl5lMof6nt6Bgaan0ou7bf3h-amTL0jt9vqeqhPsXUtOs0K3d551DH3k1hhZk3aVOj1ROjKJhOcin3urseUj_YqoATwqscP7ySqcnWw"/>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary p-2 rounded-full shadow-md hover:bg-opacity-90">
<span class="material-symbols-outlined text-[16px]" data-icon="edit">edit</span>
</button>
</div>
<h1 class="text-h2 font-h2 text-on-surface mt-xs">Alex Chen</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant">Scholarly Focus: <span class="font-semibold text-primary">Bar Exam 2024</span></p>
</section>
<!-- Bento Grid Stats -->
<section class="grid grid-cols-2 gap-card-gap">
<!-- Streak -->
<div class="bg-[#FAF3E0] rounded-[16px] p-md shadow-[0_4px_15px_0_rgba(30,30,30,0.04)] flex flex-col justify-center items-center text-center gap-xs">
<span class="material-symbols-outlined text-[#C8A97E] text-4xl mb-xs" data-icon="local_fire_department" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<p class="text-h2 font-h2 text-on-surface">5 Days</p>
<p class="text-label-caps font-label-caps text-on-surface-variant">Current Streak</p>
</div>
<!-- Total Hours -->
<div class="bg-[#FAF3E0] rounded-[16px] p-md shadow-[0_4px_15px_0_rgba(30,30,30,0.04)] flex flex-col justify-center items-center text-center gap-xs">
<span class="material-symbols-outlined text-outline text-4xl mb-xs" data-icon="hourglass_empty">hourglass_empty</span>
<p class="text-h2 font-h2 text-on-surface">124h</p>
<p class="text-label-caps font-label-caps text-on-surface-variant">Total Study Hours</p>
</div>
<!-- Daily Goal (Full Width) -->
<div class="col-span-2 bg-[#FAF3E0] rounded-[16px] p-md shadow-[0_4px_15px_0_rgba(30,30,30,0.04)] flex flex-col gap-sm">
<div class="flex justify-between items-center">
<p class="text-body-sm font-body-sm text-on-surface-variant">Daily Study Goal</p>
<p class="text-body-md font-body-md font-semibold text-on-surface">4 of 6 Hours</p>
</div>
<!-- Progress Tracker -->
<div class="h-1 bg-surface-dim rounded-full w-full overflow-hidden">
<div class="h-full bg-[#C8A97E] rounded-full" style="width: 66%;"></div>
</div>
</div>
</section>
<!-- Actions -->
<section class="flex flex-col gap-sm mt-md">
<button class="w-full bg-[#C8A97E] text-[#1E1E1E] py-3 rounded-full text-button font-button shadow-[0_4px_15px_0_rgba(30,30,30,0.04)] hover:bg-opacity-90 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="manage_accounts">manage_accounts</span>
                Edit Profile
            </button>
<button class="w-full bg-transparent border border-[#6B6B6B] text-on-surface py-3 rounded-full text-button font-button hover:bg-surface-dim transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="restart_alt">restart_alt</span>
                Reset Data
            </button>
<button class="w-full bg-transparent text-error py-3 rounded-full text-button font-button hover:bg-error-container transition-colors flex items-center justify-center gap-2 mt-xs">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                Logout
            </button>
</section>

<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 p-2 hover:text-stone-700 dark:hover:text-stone-300" href="#">

<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Tasks</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 p-2 hover:text-stone-700 dark:hover:text-stone-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="add_circle">add_circle</span>
<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Add</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 p-2 hover:text-stone-700 dark:hover:text-stone-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Stats</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-900 dark:text-amber-100 bg-stone-100 dark:bg-stone-800 rounded-2xl p-2 px-4 transition-all scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-manrope text-[10px] font-medium uppercase tracking-widest text-[#C8A97E] dark:text-amber-200">Profile</span>
