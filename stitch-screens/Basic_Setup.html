<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyTrack AI - Setup</title>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#ddd9d8",
                        "inverse-surface": "#313030",
                        "on-surface-variant": "#444748",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary": "#0a0400",
                        "surface-container": "#f1edec",
                        "primary-container": "#1e1e1e",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#e5e2e1",
                        "on-tertiary-fixed-variant": "#594320",
                        "on-secondary": "#ffffff",
                        "surface": "#fdf8f8",
                        "surface-bright": "#fdf8f8",
                        "surface-container-high": "#ebe7e6",
                        "primary": "#040505",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#626262",
                        "on-primary-fixed-variant": "#474746",
                        "outline": "#747878",
                        "on-background": "#1c1b1b",
                        "tertiary-container": "#2c1b00",
                        "on-tertiary-container": "#9e825a",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f7f3f2",
                        "error-container": "#ffdad6",
                        "surface-tint": "#5f5e5e",
                        "secondary": "#5e5e5e",
                        "on-primary-fixed": "#1b1b1c",
                        "inverse-primary": "#c8c6c5",
                        "surface-container-highest": "#e5e2e1",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-container": "#878585",
                        "on-surface": "#1c1b1b",
                        "secondary-container": "#e1dfdf",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#e2c195",
                        "secondary-fixed": "#e4e2e2",
                        "inverse-on-surface": "#f4f0ef",
                        "on-tertiary-fixed": "#281800",
                        "on-secondary-fixed-variant": "#464747",
                        "outline-variant": "#c4c7c7",
                        "tertiary-fixed": "#ffddb0",
                        "surface-variant": "#e5e2e1",
                        "error": "#ba1a1a",
                        "background": "#fdf8f8",
                        "on-error": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "card-gap": "12px",
                        "md": "16px",
                        "unit": "4px",
                        "sm": "8px",
                        "xs": "4px",
                        "lg": "24px",
                        "xl": "32px",
                        "container-padding": "20px"
                    },
                    fontFamily: {
                        "label-caps": ["Manrope"],
                        "h3": ["Manrope"],
                        "h2": ["Manrope"],
                        "body-sm": ["Manrope"],
                        "h1": ["Manrope"],
                        "button": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "body-md": ["Manrope"]
                    },
                    fontSize: {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "h3": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h1": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "button": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Chrome, Safari, Edge, Opera hide spin buttons */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* Firefox hide spin buttons */
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low min-h-screen font-body-md text-body-md text-on-surface flex flex-col items-center justify-center p-container-padding selection:bg-tertiary-fixed selection:text-tertiary">
<main class="w-full max-w-md w-full animate-fade-in-up">
<header class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high mb-md shadow-[0_4px_15px_0_rgba(30,30,30,0.02)]">
<span class="material-symbols-outlined text-h1 text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Welcome</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Set up your academic profile to begin.</p>
</header>
<form class="bg-surface-container-lowest rounded-xl p-lg flex flex-col gap-lg shadow-[0_4px_15px_0_rgba(30,30,30,0.04)]">
<div class="flex flex-col gap-sm">
<label class="font-button text-button text-on-surface ml-xs" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">person</span>
<input class="w-full bg-surface-container pl-[44px] pr-md py-md rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline outline-none border-[1.5px] border-transparent focus:border-on-tertiary-container focus:bg-surface-container-lowest transition-all" id="fullName" placeholder="e.g. Eleanor Shellstrop" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-sm">
<label class="font-button text-button text-on-surface ml-xs" for="targetExam">Target Exam</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">school</span>
<select class="w-full appearance-none bg-surface-container pl-[44px] pr-md py-md rounded-lg font-body-md text-body-md text-on-surface outline-none border-[1.5px] border-transparent focus:border-on-tertiary-container focus:bg-surface-container-lowest transition-all" id="targetExam" required="">
<option class="text-outline" disabled="" selected="" value="">Select an exam...</option>
<option value="mcat">MCAT (Medical)</option>
<option value="lsat">LSAT (Law)</option>
<option value="gmat">GMAT (Business)</option>
<option value="gre">GRE (Graduate)</option>
<option value="sat">SAT / ACT (Undergrad)</option>
<option value="cpa">CPA (Accounting)</option>
<option value="other">Other / General Study</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-sm">
<div class="flex items-center justify-between ml-xs">
<label class="font-button text-button text-on-surface" for="studyGoal">Daily Study Goal</label>
<span class="font-body-sm text-body-sm text-on-surface-variant">Hours</span>
</div>
<div class="flex items-center gap-md">
<button aria-label="Decrease hours" class="w-[52px] h-[52px] shrink-0 rounded-lg bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="flex-1 bg-surface-container px-md py-md rounded-lg font-h2 text-h2 text-center text-on-surface outline-none border-[1.5px] border-transparent focus:border-on-tertiary-container focus:bg-surface-container-lowest transition-all" id="studyGoal" max="14" min="0.5" required="" step="0.5" type="number" value="2.5"/>
<button aria-label="Increase hours" class="w-[52px] h-[52px] shrink-0 rounded-lg bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<div class="mt-xs pt-xs border-t border-surface-container">
<button class="w-full bg-tertiary-fixed-dim text-tertiary font-button text-button py-md rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-sm" type="submit">
                    Save and Continue
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-md">
                    You can adjust these settings later.
                </p>
</div>
</form>
</main>
</body></html>
